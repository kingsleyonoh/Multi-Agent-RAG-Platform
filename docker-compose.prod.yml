# Multi-Agent RAG Platform — Production on DigitalOcean VPS (1GB)
# Neo4j excluded due to RAM constraints — graph search gracefully returns empty.
# Deploy via: scp docker-compose.prod.yml deploy@104.248.137.96:/apps/multi-agent-rag/docker-compose.yml

services:
  app:
    image: ghcr.io/kingsleyonoh/multi-agent-rag:latest
    container_name: multi-agent-rag
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.multi-agent-rag.rule=Host(`ai.kingsleyonoh.com`)"
      - "traefik.http.routers.multi-agent-rag.entrypoints=websecure"
      - "traefik.http.routers.multi-agent-rag.tls.certresolver=letsencrypt"
      - "traefik.http.services.multi-agent-rag.loadbalancer.server.port=8000"
    networks:
      - traefik-public
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    container_name: multi-agent-rag-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragplatform
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: R4gPl4tf0rm_Pr0d_2026!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: multi-agent-rag-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - internal

volumes:
  pg_data:
  redis_data:

networks:
  traefik-public:
    external: true
  internal:
